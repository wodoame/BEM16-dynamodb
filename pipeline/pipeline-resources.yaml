AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Per-environment pipeline resources for the Music table SAM deployments:
  a dedicated artifacts bucket, a CloudFormation execution role scoped to just
  the Music table, and a GitHub-OIDC-trusted deployer role scoped to just this
  environment's stack and bucket. Deploy once per stage (dev, prod).

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod
  GitHubOrg:
    Type: String
    Description: GitHub organization or username that owns the repo
  GitHubRepo:
    Type: String
    Description: GitHub repository name (without owner)
  GitHubEnvironmentName:
    Type: String
    Description: >
      Name of the GitHub Environment used by this stage's workflow
      (must match the `environment:` key, e.g. dev or production)
  OidcProviderArn:
    Type: String
    Description: ARN of the GitHub OIDC provider (output of oidc-provider.yaml)

Resources:
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "music-table-artifacts-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "music-table-cfn-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDbTableManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:ListTagsOfResource
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:UpdateContinuousBackups
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Music-${Environment}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Music-${Environment}/index/*"

  DeployerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "music-table-deploy-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironmentName}"
      Policies:
        - PolicyName: SamDeployPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:ListStackResources
                  - cloudformation:GetTemplate
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/music-table-${Environment}/*"
              - Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactsBucket.Arn
                  - !Sub "${ArtifactsBucket.Arn}/*"
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com

Outputs:
  ArtifactsBucketName:
    Description: Dedicated S3 artifacts bucket for this environment
    Value: !Ref ArtifactsBucket
  CloudFormationExecutionRoleArn:
    Description: Role CloudFormation assumes to create/update the Music table
    Value: !GetAtt CloudFormationExecutionRole.Arn
  DeployerRoleArn:
    Description: Role GitHub Actions assumes via OIDC to run sam deploy
    Value: !GetAtt DeployerRole.Arn
